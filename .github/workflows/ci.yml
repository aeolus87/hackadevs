name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hackadevs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hackadevs_test
      JWT_SECRET: ci-test-jwt-secret-16chars
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prisma migrate
        run: pnpm --filter @hackadevs/server exec prisma migrate deploy

      - name: Seed database
        run: pnpm --filter @hackadevs/server exec tsx src/seed.ts

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm build

      - run: pnpm test

      - name: Start Judge0
        run: docker compose -f docker-compose.judge0.yml up -d

      - name: Wait for Judge0
        run: |
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:2358/system_info; then
              exit 0
            fi
            sleep 2
          done
          echo "Judge0 failed to become ready"
          exit 1

      - run: pnpm exec playwright install chromium --with-deps

      - name: E2E
        env:
          JUDGE0_API_URL: http://127.0.0.1:2358
        run: pnpm test:e2e
