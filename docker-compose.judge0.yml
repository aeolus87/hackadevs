version: '3.8'
services:
  judge0-server:
    image: judge0/judge0:1.13.1
    ports:
      - '2358:2358'
    environment:
      REDIS_URL: redis://judge0-redis:6379
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0password
      POSTGRES_HOST: judge0-db
    depends_on:
      - judge0-db
      - judge0-redis

  judge0-worker:
    image: judge0/judge0:1.13.1
    command: ['./scripts/workers']
    privileged: true
    environment:
      REDIS_URL: redis://judge0-redis:6379
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0password
      POSTGRES_HOST: judge0-db
    depends_on:
      - judge0-db
      - judge0-redis

  judge0-db:
    image: postgres:14
    environment:
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0password
    volumes:
      - judge0_db:/var/lib/postgresql/data

  judge0-redis:
    image: redis:7

volumes:
  judge0_db:
