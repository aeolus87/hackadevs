services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aeokit
      POSTGRES_PASSWORD: aeokit_pass
      POSTGRES_DB: aeokit_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aeokit -d aeokit_db']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
