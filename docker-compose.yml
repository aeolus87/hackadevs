services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hackadevs
      POSTGRES_PASSWORD: hackadevs
      POSTGRES_DB: hackadevs
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hackadevs -d hackadevs']
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  postgres_data:
